apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: smart-devops

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      containers:
        - name: backend

          image: smart-backend:v2

          imagePullPolicy: Never

          ports:
            - containerPort: 8081
          resources:
              requests:
                cpu: "200m"
                memory: "256Mi"

              limits:
                cpu: "500m"
                memory: "512Mi"

          envFrom:
            - configMapRef:
                name: backend-config

          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SPRING_DATASOURCE_PASSWORD

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081

            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
             httpGet:
                path: /actuator/health
                port: 8081
             initialDelaySeconds: 120
             periodSeconds: 10

          readinessProbe:
               httpGet:
                  path: /actuator/health
                  port: 8081
               initialDelaySeconds: 90
               periodSeconds: 10