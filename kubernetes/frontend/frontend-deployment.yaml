apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: smart-devops

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:

    metadata:
      labels:
        app: frontend

    spec:

      containers:
        - name: frontend

          image: smart-frontend:v1

          imagePullPolicy: Never

          ports:
            - containerPort: 80