apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: backend-monitor
  namespace: monitoring

  labels:
    release: monitoring

spec:
  selector:
    matchLabels:
      app: backend

  namespaceSelector:
    matchNames:
      - smart-devops

  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s