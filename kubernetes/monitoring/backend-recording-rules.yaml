apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: backend-recording-rules
  namespace: monitoring

  labels:
    release: monitoring

spec:
  groups:
    - name: backend.recording.rules

      rules:
        - record: backend:rps

          expr: sum(rate(http_server_requests_seconds_count[1m]))

        - record: backend:error_rate

          expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[1m])) or vector(0)

        - record: backend:cpu_usage

          expr: process_cpu_usage * 100

        - record: backend:error_ratio

          expr: |
              (
                 sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
                 /
                 sum(rate(http_server_requests_seconds_count[5m]))
              ) or vector(0)




        - record: backend:error_ratio_1m

          expr: |
             (
               sum(rate(http_server_requests_seconds_count{status=~"5.."}[1m]))
               /
              sum(rate(http_server_requests_seconds_count[1m]))
              ) or vector(0)

        - record: backend:error_ratio_15m

          expr: |
              (
              sum(rate(http_server_requests_seconds_count{status=~"5.."}[15m]))
               /
              sum(rate(http_server_requests_seconds_count[15m]))
              ) or vector(0)