spring.application.name=energy

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_home_house?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin123
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Timezone configuration for consistent date/time handling
spring.jackson.time-zone=Asia/Kolkata

# Server Configuration
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

# Frontend base URL for reset password links
smarthome.app.frontendBaseUrl=http://localhost:3000

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.smarthome.energy=DEBUG
logging.level.com.smarthome.energy.service.EmailService=DEBUG

# Spring Mail Configuration
# SMTP Configuration - Configure with your email credentials
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Note: If email is not configured, reset tokens will be logged to console for development

# Security
# spring.security.user.name=user
# spring.security.user.password=password

# Audit Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.smarthome.energy.controller=DEBUG
logging.level.com.smarthome.energy.service.AdminService=DEBUG
logging.level.com.smarthome.energy.service.DeviceService=DEBUG
logging.level.com.smarthome.energy.service.TechnicianService=DEBUG

# JWT Configuration
smarthome.app.jwtSecret=SmartHomeEnergyMgmtSecretKey2024XYZabcdefghijklmnopqrstuvwxyz0123456789AB
smarthome.app.jwtExpirationMs=86400000

# Security
spring.security.enable.method.security=true

# Data Seeder - Auto-create test users
smarthome.app.seeder.enabled=true
smarthome.app.seeder.create-test-users=true

# Energy rate configuration (cost per kWh in Indian Rupees)
smarthome.app.energyRatePerKwh=8.0

# Path to the energy dataset CSV (relative to working directory)
smarthome.app.datasetFilePath=../smart_home_energy_usage_dataset.csv

# Google OAuth2 Configuration
# Replace with your actual Google OAuth credentials from https://console.cloud.google.com/
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub



# ==========================================
# ACTUATOR / OBSERVABILITY
# ==========================================

management.endpoints.web.exposure.include=health,info,metrics,prometheus

management.endpoint.health.show-details=always

management.endpoint.prometheus.access=unrestricted

management.health.defaults.enabled=true

management.metrics.tags.application=smart-backend

management.prometheus.metrics.export.enabled=true

management.endpoint.health.show-details=always

management.endpoint.health.show-components=always
management.health.mail.enabled=false

spring.profiles.active=dev